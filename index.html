<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debayan Roy | Portfolio</title>
  <style>
    :root {
      --bg-1: #f7efe3;
      --bg-2: #e8f1ff;
      --card: #ffffff;
      --ink: #1b1f24;
      --muted: #475467;
      --accent: #0a6f5a;
      --accent-2: #084f40;
      --ring: rgba(10, 111, 90, 0.2);
      --shadow: 0 18px 45px rgba(26, 39, 79, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 209, 102, 0.35), transparent 35%),
        radial-gradient(circle at 85% 10%, rgba(0, 114, 245, 0.22), transparent 40%),
        linear-gradient(140deg, var(--bg-1), var(--bg-2));
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--ink);
      padding: 24px;
    }

    .hero {
      width: min(920px, 100%);
      background: var(--card);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 28px;
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 28px;
      align-items: center;
      animation: rise 0.8s ease-out;
      border: 1px solid rgba(10, 111, 90, 0.08);
    }

    .photo-wrap {
      justify-self: center;
      position: relative;
    }

    .photo-wrap::after {
      content: "";
      position: absolute;
      inset: -10px;
      border-radius: 999px;
      border: 2px solid var(--ring);
    }

    .photo {
      width: 240px;
      height: 240px;
      border-radius: 999px;
      object-fit: cover;
      border: 4px solid #fff;
      display: block;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.16);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 3.6vw, 2.8rem);
      line-height: 1.05;
      letter-spacing: 0.2px;
    }

    .tagline {
      margin: 12px 0 8px;
      font-size: 1.05rem;
      color: var(--muted);
      font-weight: 600;
    }

    .edu {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.65;
    }

    .buttons {
      margin-top: 22px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn {
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 12px;
      font-weight: 700;
      letter-spacing: 0.2px;
      padding: 12px 18px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
      border: 1px solid transparent;
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 10px 22px rgba(8, 79, 64, 0.26);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 24px rgba(8, 79, 64, 0.3);
    }

    .btn-secondary {
      color: var(--accent-2);
      border-color: rgba(8, 79, 64, 0.25);
      background: #f8fffc;
    }

    .btn-secondary:hover {
      background: #ecfef7;
      transform: translateY(-1px);
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 760px) {
      .hero {
        grid-template-columns: 1fr;
        text-align: center;
        padding: 24px 18px;
      }

      .buttons {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="photo-wrap">
      <img class="photo" src="./profile.jpeg" alt="Debayan Roy profile picture" />
    </div>
    <div>
      <h1>Debayan Roy</h1>
      <p class="tagline">BBA DBE 2ND YEAR STUDENT</p>
      <p class="edu">IIT MADRAS BS DATA SCIENCE - FIRST YEAR</p>
      <div class="buttons">
        <a class="btn btn-primary" href="./Debayan_Roy_Amazon_Resume_GustiLeder.pdf" download>
          Download Resume
        </a>
        <a class="btn btn-secondary" href="./Debayan_Roy_Amazon_Resume_GustiLeder.pdf" target="_blank" rel="noopener noreferrer">
          View Resume
        </a>
      </div>
    </div>
  </section>
</body>
</html>
